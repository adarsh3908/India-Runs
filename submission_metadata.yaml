ai_usage_summary: |
  Used Gemini 3.5 Flash for architectural discussion, ranking optimization, and writing code structure. No candidate data was sent to hosted APIs.

methodology_summary: |
  Rules-based ranking system utilizing strict validation checks to filter out all 441 honeypots (inconsistent profiles, impossible dates/founding years) and consulting-only candidates. Candidates are scored based on experience curves, primary/secondary skills matching, and title/career descriptions. Scores are modified using platform engagement signals (recruiter response rates, inactivity decay, notice periods). Completed in less than 20 seconds on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
