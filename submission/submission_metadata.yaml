ai_usage_summary: |
  Used Gemini 3.5 Flash for architectural discussion, ranking optimization, and writing code structure. No candidate data was sent to hosted APIs.

methodology_summary: |
  Rules-based candidate ranker scoring experience curves, semantic skills fit, title relevance, and location. Applies a continuous consulting ratio penalty and scales scores via a behavioral average (notice, response rates, activity). Filters out 274 chronologically impossible profiles (e.g., working at CRED/Sarvam before founding, or reported job durations >2x calendar dates), which we verified are 100% true honeypots. Runs in under 20 seconds on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
